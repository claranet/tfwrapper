name: Release

env:
  PYTHON_VERSION: "3.14"

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  Release:
    environment: release
    runs-on: ubuntu-latest
    permissions:
      # Gives the action the necessary permissions for creating releases
      contents: write
      # Gives the action the necessary permissions to request the OIDC JWT ID token needed to authenticate against PyPI
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Get tag
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "${{ env.PYTHON_VERSION }}"

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4

      - name: Build project for distribution
        run: uv build

      - name: Check Version
        id: check-version
        run: |
          [[ "$(uv version --short)" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] \
            || echo "prerelease=true" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1
        with:
          artifacts: "dist/*"
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: ${{ steps.check-version.outputs.prerelease == 'true' }}

      - name: Publish release distributions to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
