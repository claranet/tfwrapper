name: Release

# PR-based release automation with release-please.
#
# On every push to master, release-please maintains a "release" pull request
# that bumps the version in pyproject.toml and updates CHANGELOG.md from the
# Conventional Commits since the last release. Merging that PR (a human action)
# makes release-please create the GitHub release and the vX.Y.Z tag, and the
# publish job then builds and uploads the distributions to PyPI.
#
# Everything runs on the default GITHUB_TOKEN: no PAT or other secret is
# required. PyPI publishing uses OIDC trusted publishing, scoped to this
# workflow file (release.yml) and the "release" environment.

on:
  push:
    branches:
      - master

permissions: {}

env:
  PYTHON_VERSION: "3.14"

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    name: Publish to PyPI
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    environment: release
    permissions:
      # Upload the built distributions to the GitHub release created above
      contents: write
      # Request the OIDC JWT ID token needed to authenticate against PyPI
      id-token: write
    steps:
      - name: Checkout released tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "${{ env.PYTHON_VERSION }}"

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4

      - name: Build project for distribution
        run: uv build

      - name: Upload distributions to the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ needs.release-please.outputs.tag_name }}" dist/* --clobber

      - name: Publish release distributions to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
